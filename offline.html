<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ea580c">
  <title>Offline | Champak Search</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; font-family: system-ui, sans-serif; color: #1f2937; background: linear-gradient(135deg, #fff7ed, #fffbeb); }
    main { width: min(520px, 100%); padding: 32px; text-align: center; background: white; border: 1px solid #fed7aa; border-radius: 24px; box-shadow: 0 18px 45px rgba(124,45,18,.14); }
    h1 { color: #9a3412; }
    p { line-height: 1.6; }
    button { border: 0; border-radius: 14px; padding: 13px 20px; color: white; background: #ea580c; font: inherit; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <main>
    <h1>You’re offline</h1>
    <p>Champak Search cannot reach the internet right now. Previously loaded search resources may still be available from the main page.</p>
    <button type="button" onclick="location.href='/'">Open Champak Search</button>
  </main>
</body>
</html>
