<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Interactive Flowcharts: Max of Three (a, b, c)</title>
<style>
  :root{
    --bg:#f3f7ff; --card:#fff; --ink:#0f2544; --muted:#5f6f8f; --accent:#0b72e7; --border:#dbe6ff; --soft:#f0f6ff;
    --yes:#0e9f6e; --no:#d64545; --step:#6b7da3;
  }
  *{box-sizing:border-box}
  body{margin:0;font:16px/1.6 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;background:linear-gradient(180deg,var(--bg),#fff 60%);color:var(--ink)}
  .wrap{max-width:1100px;margin:auto;padding:28px 18px}
  header{display:flex;gap:16px;align-items:center;justify-content:space-between;margin-bottom:20px}
  .brand{font-weight:800;font-size:clamp(20px,3.5vw,32px)}
  .tag{color:var(--muted);font-size:14px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:0 12px 24px rgba(17,42,88,.06)}
  .grid{display:grid;gap:14px}
  @media(min-width:980px){.grid{grid-template-columns:1fr 1fr}}
  label{font-size:13px;color:var(--muted)}
  input[type=number], select{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:#fff;color:var(--ink);outline:none}
  input[type=number]:focus, select:focus{box-shadow:0 0 0 3px rgba(11,114,231,.18)}
  button{border:0;border-radius:12px;padding:10px 14px;background:var(--accent);color:#fff;font-weight:700;cursor:pointer}
  button.ghost{background:transparent;border:1px solid var(--border);color:var(--accent)}
  .hstack{display:flex;gap:8px;align-items:center}
  .note{color:var(--muted);font-size:14px}
  .result{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fff;margin-top:10px}
  .cta{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border);background:var(--accent);color:#fff;padding:10px 14px;border-radius:12px;font-weight:700;text-decoration:none}
  .cta.ghost{background:transparent;color:var(--accent)}
  .progress{height:10px;background:#eaf1ff;border:1px solid var(--border);border-radius:999px;overflow:hidden}
  .progress > span{display:block;height:100%;background:var(--accent);width:0%}
  .checks{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .checks label{display:flex;gap:10px;align-items:center;background:var(--soft);border:1px solid var(--border);padding:10px 12px;border-radius:10px}

  /* Flowchart styling */
  .chartbox{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px;overflow:auto}
  svg{max-width:100%;height:auto}
  .node rect, .node path.rhombus, .node ellipse{fill:#fff;stroke:var(--border);stroke-width:2}
  .node text{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px;fill:#0b2247}
  .edge path{stroke:#9fb5e7;stroke-width:3;fill:none;marker-end:url(#arrow)}
  .edge text{font-size:12px;fill:var(--muted)}
  .active.node rect, .active.node path.rhombus, .active.node ellipse{stroke:var(--accent);stroke-width:3}
  .active.edge path{stroke:var(--accent);stroke-width:4}
  .edge.yes path{stroke:color-mix(in oklab, var(--yes) 70%, #fff 30%)}
  .edge.no path{stroke:color-mix(in oklab, var(--no) 70%, #fff 30%)}
  .active.edge.yes path{stroke:var(--yes)}
  .active.edge.no path{stroke:var(--no)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="brand">Interactive Flowcharts — Max of Three</div>
      <div class="tag">Enter values for a, b, c and choose an approach to see the decision path highlighted.</div>
    </div>
    <div class="hstack">
      <a class="cta ghost" href="https://wa.me/?text=Hi%2C%20I%27m%20viewing%20your%20Interactive%20Flowcharts%20and%20had%20a%20question" target="_blank">Contact on WhatsApp</a>
      <button id="btnExample" class="ghost">Try examples</button>
      <button id="btnReset" class="ghost">Reset</button>
    </div>
  </header>

  <section class="grid">
    <article class="card">
      <h2>1) Inputs</h2>
      <div class="grid" style="grid-template-columns:repeat(3,1fr);gap:10px">
        <div><label for="a">a</label><input type="number" id="a" step="any" value="1"></div>
        <div><label for="b">b</label><input type="number" id="b" step="any" value="2"></div>
        <div><label for="c">c</label><input type="number" id="c" step="any" value="3"></div>
      </div>
      <div class="note" style="margin-top:10px">Enter any numeric values (including negatives and decimals).</div>
