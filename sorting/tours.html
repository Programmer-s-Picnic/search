<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Explore Tours with Stop Slideshows</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fff8f0;
      color: #4a403a;
      line-height: 1.6;
    }

    header {
      background: #f1b24a;
      color: #3a2a0a;
      padding: 1.5rem;
      text-align: center;
      box-shadow: 0 2px 8px rgba(241, 178, 74, 0.5);
    }

    header h1 {
      font-size: 2.2rem;
      margin-bottom: .3rem;
    }

    .container {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .search-box {
      max-width: 400px;
      margin: 0 auto 2rem auto;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 0.8rem 3rem 0.8rem 1rem;
      font-size: 1rem;
      border: 2px solid #f1b24a;
      border-radius: 50px;
    }

    .tour-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2rem;
    }

    .tour-card {
      background: #fff3e6;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(241, 178, 74, 0.3);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .tour-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .tour-content {
      padding: 1rem 1.5rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .tour-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #b35200;
      margin-bottom: 0.5rem;
    }

    .tour-description {
      flex-grow: 1;
      margin-bottom: 0.8rem;
    }

    .tour-details {
      font-size: 0.9rem;
      margin-bottom: 0.8rem;
    }

    .tour-details span {
      display: inline-block;
      margin-right: 1rem;
      font-weight: 600;
    }

    .tour-stops-container {
      background: #f9e6bb;
      border-radius: 8px;
      padding: 0.6rem;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stop-button {
      background: #d17e00;
      color: white;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
    }

    .stop-display {
      flex-grow: 1;
      text-align: center;
      font-weight: 600;
    }

    .slideshow-btn {
      margin-top: .8rem;
      background: #b35200;
      color: #fff;
      padding: 0.5rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .slideshow-btn:hover {
      background: #8a3f00;
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      position: relative;
      background: white;
      padding: 1rem;
      border-radius: 10px;
      max-width: 700px;
      width: 95%;
    }

    .modal img {
      width: 100%;
      border-radius: 8px;
    }

    .modal-caption {
      margin-top: .5rem;
      text-align: center;
      font-weight: bold;
    }

    .close-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #b35200;
      color: white;
      border: none;
      font-size: 1.2rem;
      border-radius: 50%;
      cursor: pointer;
      width: 30px;
      height: 30px;
    }

    .modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
      color: white;
      background: rgba(0, 0, 0, 0.3);
      border: none;
      cursor: pointer;
      padding: .3rem .5rem;
    }

    .prev {
      left: 10px;
    }

    .next {
      right: 10px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Discover Amazing Tours</h1>
    <p>Find your perfect adventure with detailed tours and stops slideshow.</p>
  </header>

  <div class="container">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search tours..." oninput="filterTours()" />
    </div>
    <div class="tour-list" id="tourList"></div>
  </div>

  <!-- Modal -->
  <div class="modal" id="slideshowModal">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal()">×</button>
      <button class="modal-nav prev" onclick="changeSlide(-1)">&#10094;</button>
      <img id="slideImage" src="" alt="Stop Image">
      <p class="modal-caption" id="slideCaption"></p>
      <button class="modal-nav next" onclick="changeSlide(1)">&#10095;</button>
    </div>
  </div>

  <script>
    const tours = [
      {
        id: 1,
        name: "Heritage City Walk",
        image: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=60",
        description: "Explore the city's rich heritage sites.",
        distance: "5 km",
        time: "3 hours",
        charges: "₹500 per person",
        stops: [
          { name: "Old Fort", img: "https://images.unsplash.com/photo-1551632436-cbf8dd35adfa?auto=format&fit=crop&w=800&q=60" },
          { name: "City Museum", img: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=60" },
          { name: "Central Park", img: "https://images.unsplash.com/photo-1508609349937-5ec4ae374ebf?auto=format&fit=crop&w=800&q=60" }
        ]
      },
      {
        id: 2,
        name: "Coastal Beach Excursion",
        image: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=60",
        description: "Relax on beautiful beaches.",
        distance: "8 km",
        time: "4 hours",
        charges: "₹800 per person",
        stops: [
          { name: "Sunset Beach", img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=60" },
          { name: "Lighthouse", img: "https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=800&q=60" },
          { name: "Seaside Cafe", img: "https://images.unsplash.com/photo-1529927066849-a62cd3b54810?auto=format&fit=crop&w=800&q=60" }
        ]
      }
    ];

    let currentStopsIndex = {};
    let slideshowTour = null;
    let slideIndex = 0;
    let slideTimer;

    function displayTours(list) {
      const container = document.getElementById("tourList");
      container.innerHTML = "";
      list.forEach(tour => {
        currentStopsIndex[tour.id] = 0;
        const card = document.createElement("div");
        card.className = "tour-card";
        card.innerHTML = `
      <img src="${tour.image}" alt="${tour.name}" class="tour-image">
      <div class="tour-content">
        <h2 class="tour-title">${tour.name}</h2>
        <p class="tour-description">${tour.description}</p>
        <p class="tour-details">
          <span>Distance: ${tour.distance}</span>
          <span>Time: ${tour.time}</span>
          <span>Charges: ${tour.charges}</span>
        </p>
        <div class="tour-stops-container">
          <button class="stop-button" onclick="moveStop(${tour.id}, -1)">&#8592;</button>
          <span class="stop-display" id="stop-display-${tour.id}">${tour.stops[0].name}</span>
          <button class="stop-button" onclick="moveStop(${tour.id}, 1)">&#8594;</button>
        </div>
        <button class="slideshow-btn" onclick="openModal(${tour.id})">Run Slideshow</button>
      </div>
    `;
        container.appendChild(card);
      });
    }

    function moveStop(tourId, dir) {
      const tour = tours.find(t => t.id === tourId);
      let idx = currentStopsIndex[tourId] + dir;
      if (idx < 0) idx = 0;
      if (idx >= tour.stops.length) idx = tour.stops.length - 1;
      currentStopsIndex[tourId] = idx;
      document.getElementById(`stop-display-${tourId}`).textContent = tour.stops[idx].name;
    }

    function filterTours() {
      const term = document.getElementById("searchInput").value.toLowerCase();
      const filtered = tours.filter(t =>
        t.name.toLowerCase().includes(term) ||
        t.stops.some(s => s.name.toLowerCase().includes(term))
      );
      displayTours(filtered);
    }

    function openModal(tourId) {
      slideshowTour = tours.find(t => t.id === tourId);
      slideIndex = 0;
      document.getElementById("slideshowModal").style.display = "flex";
      showSlide();
      slideTimer = setInterval(() => changeSlide(1), 3000);
    }

    function closeModal() {
      document.getElementById("slideshowModal").style.display = "none";
      clearInterval(slideTimer);
    }

    function changeSlide(n) {
      slideIndex += n;
      if (slideIndex < 0) slideIndex = slideshowTour.stops.length - 1;
      if (slideIndex >= slideshowTour.stops.length) slideIndex = 0;
      showSlide();
    }

    function showSlide() {
      const stop = slideshowTour.stops[slideIndex];
      document.getElementById("slideImage").src = stop.img;
      document.getElementById("slideCaption").textContent = stop.name;
    }
    document.getElementById("slideshowModal").addEventListener("click", function (e) {
      if (e.target === this) {
        closeModal();
      }
    });
    displayTours(tours);
  </script>

</body>

</html>
